services:
  backend:
    build: ./backend
    container_name: prgice_backend
    ports:
      - "8080:8080"
    environment:
      DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/ice_shop
      DATASOURCE_USERNAME: ${DATASOURCE_USERNAME}
      DATASOURCE_PASSWORD: ${DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

  frontend:
    image: nginx:alpine
    container_name: prgice_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

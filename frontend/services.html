<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Products</title>
    <link rel="stylesheet" href="services.css">
</head>

<body class="services-page">

<header class="header">
    <a href="index.html" class="logo">
        <img src="cm ice.png" alt="Logo">
    </a>
    <nav class="navbar">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="gallerie.html">Gallery</a>
        <a href="services.html">Services</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<section class="services-content">
    <div class="services-image">
        <img src="Green and White Minimalist Business Card Mockup Instagram Post-3 copy 2.png">
    </div>
    <div class="services-text">
        <h1>Our Services</h1>
        <p>High-quality food-grade ice cubes for events and businesses.</p>
        <p>Fast delivery, hygiene standards, professional service.</p>
    </div>
</section>

<section style="width:100%; padding:60px 10%; text-align:center;">
    <h2 style="color:#012350; margin-bottom:40px;">Our Products</h2>
    <div id="products"
         style="display:flex; gap:40px; justify-content:center; flex-wrap:wrap;">
    </div>
</section>

<footer class="footer">
    <div class="footer-content">
        <p>© 2024 CM COMPANY. All rights reserved.</p>
    </div>
</footer>

<script>
fetch("http://localhost:8080/api/products")
    .then(res => res.json())
    .then(products => {
        const container = document.getElementById("products");

        products.forEach(p => {
            const card = document.createElement("div");
            card.style.width = "260px";
            card.style.border = "1px solid #ddd";
            card.style.borderRadius = "10px";
            card.style.padding = "20px";
            card.style.background = "#fff";

            card.innerHTML = `
                <img src="${p.imageUrl}" style="width:100%; height:160px; object-fit:cover; border-radius:8px;">
                <h3 style="margin:15px 0; color:#012350;">${p.name}</h3>
                <p>${p.description}</p>
                <strong>${p.priceCents / 100} TND</strong><br><br>
                <button onclick="order(${p.id})"
                        style="padding:10px 20px;background:#012350;color:white;border:none;border-radius:6px;cursor:pointer;">
                    Order
                </button>
            `;
            container.appendChild(card);
        });
    });

function order(id) {
    const token = localStorage.getItem("token");
    if (!token) {
        window.location.href = "login.html";
    } else {
        alert("Commande autorisée pour produit " + id);
    }
}
</script>

</body>
</html>
